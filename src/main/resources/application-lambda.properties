# ─────────────────────────────────────────────────────────────
# This file activates when SPRING_PROFILES_ACTIVE=lambda
# (set in template.yaml under Environment Variables)
# Overrides application.properties for the Lambda environment
# ─────────────────────────────────────────────────────────────
 
# ===== Disable H2 (no in-memory DB on Lambda) =====
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
 
# ===== Disable Swagger UI on Lambda (optional — saves memory) =====
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
 
# ===== DynamoDB =====
# TABLE_NAME is injected from template.yaml at deploy time
aws.dynamodb.table-name=${TABLE_NAME}
#aws.dynamodb.table-name=tasks-dev

# ===== Logging — structured JSON for CloudWatch =====
# Log levels and JSON formatting are now configured in
# src/main/resources/logback-spring.xml (springProfile "lambda" block),
# NOT here — application.properties logging.level.* would conflict with
# the explicit <logger> levels already set in that file.
# logging.level.com.taskmanager=INFO
# logging.level.root=WARN
